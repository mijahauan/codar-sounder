# codar-sounder radiod channel fragment.
#
# Sigmond renders this template into
#   /etc/radio/radiod@<id>.conf.d/40-codar-sounder.conf
# during `smd apply` (CONTRACT v0.5 §15).  Editing this file directly is
# pointless — sigmond will overwrite it on the next apply; change the
# source in the codar-sounder repo instead.
#
# The channel name matches [[radiod]] channel_name in
# codar-sounder-config.toml.  preset = "iq" is required: the FMCW
# dechirping engine in core/dechirp.py needs the raw I/Q samples with
# their instantaneous phase preserved.  Other radiod presets (USB/LSB,
# AM, NFM/WFM, etc.) discard or distort phase and are unsuitable.
#
# samprate must cover the full CODAR sweep bandwidth + margin.  At 4.5 MHz
# the sweep BW is ~25.7 kHz, so samprate = 64000 (16x oversampling) is
# comfortable.  Scale up for the 13 MHz / 50 kHz and 24 MHz / 150 kHz
# CODAR bands.

[codar-4mhz]
freq      = "${RADIOD_4MHZ_CODAR_HZ}"   # default 4537180 Hz; operator may override via coordination.toml
preset    = "iq"
samprate  = 64000
encoding  = "s16le"
mode      = "iq"
