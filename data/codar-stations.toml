# Known CODAR transmitter sites — `codar-sounder config init` reads this
# file to offer an operator picker keyed on (receiver_lat, receiver_lon)
# great-circle distance, and to populate [[radiod.transmitter]] defaults.
#
# Source: HFRNet station table (CODAR_WERA.pdf, 2014 snapshot).  Only
# CODAR (FMCW) stations are listed — WERA stations use a different
# waveform that codar-sounder's dechirper does not handle.
#
# Per-station fields:
#   freq_mhz              — radiated centre frequency (MHz)
#   sweep_rate_hz_per_s   — chirp slope, signed (negative = down-chirp)
#   sweep_bw_hz           — usable sweep bandwidth (Hz)
#   sweep_repetition_hz   — sweep repetition frequency (Hz, "PRR" in CODAR docs)
#   tx_lat_deg, tx_lon_deg — antenna location (WGS84)
#   association            — operating institution (informational)

